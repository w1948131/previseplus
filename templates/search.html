{% extends "base.html" %}
{% block content %}

<div class="card">
  <h2>Stock Price Predictor</h2>
  {% if request.GET.error %}
  <div style="margin-top: 12px; padding: 12px 16px; border-radius: 10px; background: rgba(255,59,59,0.1); border:  1px solid var(--accent); color: var(--accent);">
    {{ request.GET.error }} has insufficient data needed for a prediction , Enter another Ticker
    
  </div>
  {% endif %}

  <form method="post">
    {% csrf_token %}

    <div class="form-row">
      <div>
        <label>Ticker Symbol</label>
        <input type="text" name="ticker" placeholder="e.g. AAPL" required>
      </div>

      <div>
        <label>Days (1-365)</label>
        <input type="number" name="days" min="1" max="365" value="7" required>
        <a href="/tickers">Search for Stock Tickers</a>
      </div>


      <button class="btn btn-primary" type="submit">Predict</button>
    </div>
  </form>

  {% if error %}
    <div class="error">{{ error }}</div>
  {% endif %}
</div>

{% endblock %}
